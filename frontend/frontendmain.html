<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CrisisCloud | Secure Access</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        /* --- CSS THEME VARIABLES --- */
        :root {
            --bg-body: #0b1220;
            --bg-card: #101a2e;
            --bg-input: #0b1220;
            --text-main: #ffffff;
            --text-sub: #94a3b8;
            --border-color: #1f2a44;
            --accent: #60a5fa;
            --accent-hover: #93c5fd;
            --btn-text: #081023;
            --shadow: rgba(0,0,0,0.3);
        }

        [data-theme="light"] {
            --bg-body: #f0f2f5;
            --bg-card: #ffffff;
            --bg-input: #f9fafb;
            --text-main: #1e293b;
            --text-sub: #64748b;
            --border-color: #e2e8f0;
            --accent: #2563eb;
            --accent-hover: #1d4ed8;
            --btn-text: #ffffff;
            --shadow: rgba(0,0,0,0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Arial, sans-serif;
            transition: background 0.3s ease, color 0.3s ease, border-color 0.3s ease;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: var(--bg-body);
            color: var(--text-main);
        }

        /* --- SETTINGS SIDEBAR (LEFT) --- */
        .settings-sidebar {
            position: absolute;
            left: 25px;
            top: 25px;
            z-index: 1000;
        }

        .gear-btn {
            background: var(--bg-card);
            color: var(--text-main);
            border: 1px solid var(--border-color);
            padding: 10px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 20px;
            transition: transform 0.3s ease, background 0.2s;
            box-shadow: 0 4px 12px var(--shadow);
        }

        .gear-btn:hover { background: var(--border-color); }
        .gear-btn.active { transform: rotate(90deg); color: var(--accent); }

        .dropdown-content {
            display: block;
            visibility: hidden;
            opacity: 0;
            transform: translateY(-10px);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            
            position: absolute;
            left: 0;
            top: 55px;
            background-color: var(--bg-card);
            min-width: 240px;
            box-shadow: 0px 10px 30px var(--shadow);
            border-radius: 12px;
            padding: 20px;
            border: 1px solid var(--border-color);
        }

        .dropdown-content.show {
            visibility: visible;
            opacity: 1;
            transform: translateY(0);
        }

        .setting-item { margin-bottom: 18px; }
        .setting-item label { 
            display: block; 
            color: var(--text-sub); 
            margin-bottom: 8px; 
            font-size: 0.8rem; 
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        input[type="range"] { 
            width: 100%; 
            accent-color: var(--accent);
            cursor: pointer;
        }

        .toggle-row { display: flex; justify-content: space-between; align-items: center; }

        /* --- THEME TOGGLE (RIGHT) --- */
        .theme-container {
            position: absolute;
            top: 25px;
            right: 25px;
        }

        .switch {
            position: relative;
            display: inline-block;
            width: 60px;
            height: 30px;
        }

        .switch input { opacity: 0; width: 0; height: 0; }

        .slider {
            position: absolute;
            cursor: pointer;
            inset: 0;
            background-color: #1f2a44;
            transition: .4s;
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 8px;
            border: 1px solid var(--border-color);
        }

        .slider .icon { font-size: 14px; user-select: none; }

        .slider:before {
            position: absolute;
            content: "";
            height: 22px;
            width: 22px;
            left: 4px;
            bottom: 3px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
            z-index: 2;
        }
        
        input:checked + .slider { background-color: var(--accent); }
        input:checked + .slider:before { transform: translateX(28px); }

        /* --- LOGIN CARD & MODALS --- */
        .login-card {
            background: var(--bg-card);
            padding: 2.5rem;
            border-radius: 14px;
            border: 1px solid var(--border-color);
            box-shadow: 0 10px 40px var(--shadow);
            width: 100%;
            max-width: 420px;
            z-index: 10;
        }

        .tabs { display: flex; margin-bottom: 2rem; border-bottom: 1px solid var(--border-color); }
        .tab { flex: 1; padding: 12px; text-align: center; cursor: pointer; color: var(--text-sub); font-weight: 600; }
        .tab.active { color: var(--accent); border-bottom: 2px solid var(--accent); }
        .form-section { display: none; }
        .form-section.active { display: block; }

        h2, h3 { color: var(--text-main); margin-bottom: 1.5rem; }

        .input-group { margin-bottom: 1.2rem; position: relative; }
        label { display: block; margin-bottom: 0.6rem; color: var(--text-sub); font-size: 0.85rem; }

        input[type="text"], input[type="password"] {
            width: 100%;
            padding: 0.85rem;
            border: 1px solid var(--border-color);
            background: var(--bg-input);
            color: var(--text-main);
            border-radius: 10px;
            outline: none;
        }

        input:focus { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(96, 165, 250, 0.2); }

        .btn {
            width: 100%;
            padding: 0.9rem;
            border: none;
            border-radius: 10px;
            background: var(--accent);
            color: var(--btn-text);
            font-size: 1rem;
            font-weight: 700;
            cursor: pointer;
            margin-top: 1rem;
        }

        .btn:hover { background: var(--accent-hover); transform: translateY(-1px); }
        .btn:disabled { opacity: 0.4; cursor: not-allowed; }

        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(4px);
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }

        .modal-content {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            padding: 2rem;
            border-radius: 14px;
            width: 90%;
            max-width: 400px;
            text-align: center;
        }
    </style>
</head>
<body data-theme="dark">

    <div class="settings-sidebar">
        <button class="gear-btn" id="gearBtn" title="Settings">
            <i class="fas fa-cog"></i>
        </button>

        <div id="settingsDropdown" class="dropdown-content">
            <h3 style="margin-top: 0; font-size: 1.1rem;">System Config</h3>
            
            <div class="setting-item toggle-row">
                <label>Security Alerts</label>
                <input type="checkbox" checked>
            </div>

            <div class="setting-item">
                <label>API Latency Limit</label>
                <input type="range" min="0" max="100" value="70">
            </div>

            <div class="setting-item toggle-row">
                <label>Vibration (MFA)</label>
                <input type="checkbox">
            </div>
        </div>
    </div>

    <div class="theme-container">
        <label class="switch">
            <input type="checkbox" id="theme-toggle">
            <div class="slider">
                <span class="icon">🌙</span>
                <span class="icon">☀️</span>
            </div>
        </label>
    </div>

    <div class="login-card">
        <div class="tabs">
            <div class="tab active" onclick="switchTab('login-form')">Login</div>
            <div class="tab" onclick="switchTab('signup-form')">Register</div>
        </div>

        <div id="login-form" class="form-section active">
            <h2>☁️ CrisisCloud</h2>
            <form onsubmit="return false;">
                <div class="input-group">
                    <label>Username or Email</label>
                    <input type="text" placeholder="Username or email" id="loginUser">
                </div>
                
                <div class="input-group">
                    <label>Password</label>
                    <div style="position: relative;">
                        <input type="password" placeholder="••••••••" id="loginPass">
                        <span style="position: absolute; right: 15px; top: 12px; cursor: pointer;" onclick="toggleVisibility('loginPass')">👁️</span>
                    </div>
                </div>

                <div class="options" style="display: flex; justify-content: space-between; font-size: 0.85rem; color: var(--text-sub);">
                    <label style="display: flex; align-items: center; gap: 8px; cursor: pointer;">
                        <input type="checkbox" style="width: auto;"> Remember
                    </label>
                    <a href="#" onclick="showRecovery()" style="color: var(--accent); text-decoration: none;">Forgot Password?</a>
                </div>

                <button class="btn">Access Dashboard</button>
            </form>
        </div>

        <div id="signup-form" class="form-section">
            <h2>Create Profile</h2>
            <form onsubmit="return false;">
                <div class="input-group">
                    <label>Email or Username</label>
                    <input type="text" placeholder="Create username">
                </div>
                <div class="input-group">
                    <label>Password</label>
                    <input type="password" id="new-pass" placeholder="••••••••">
                </div>
                <button type="submit" id="reg-btn" class="btn">Register Organization</button>
            </form>
        </div>
    </div>

    <div id="recoveryModal" class="modal-overlay">
        <div class="modal-content">
            <h3>Account Recovery</h3>
            <div class="input-group" style="text-align: left;">
                <label>Contact Info</label>
                <input type="text" placeholder="Email or Phone">
            </div>
            <button class="btn">Send Link</button>
            <button class="btn" style="background: var(--border-color); color: var(--text-main); margin-top: 8px;" onclick="closeRecovery()">Cancel</button>
        </div>
    </div>

    <script>
        // --- SELECTORS ---
        const gearBtn = document.getElementById('gearBtn');
        const dropdown = document.getElementById('settingsDropdown');
        const sidebar = document.querySelector('.settings-sidebar');
        const themeToggle = document.getElementById('theme-toggle');

        // --- SETTINGS TOGGLE LOGIC ---
        gearBtn.addEventListener('click', (e) => {
            e.stopPropagation();
            dropdown.classList.toggle("show");
            gearBtn.classList.toggle("active");
        });

        // Close dropdown when clicking outside
        window.addEventListener('click', (event) => {
            if (!sidebar.contains(event.target)) {
                dropdown.classList.remove("show");
                gearBtn.classList.remove("active");
            }
        });

        // --- THEME LOGIC ---
        themeToggle.checked = document.body.getAttribute('data-theme') === 'light';
        themeToggle.addEventListener('change', () => {
            const theme = themeToggle.checked ? 'light' : 'dark';
            document.body.setAttribute('data-theme', theme);
        });

        // --- UI UTILITIES ---
        function switchTab(sectionId) {
            document.querySelectorAll('.form-section').forEach(s => s.classList.remove('active'));
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById(sectionId).classList.add('active');
            event.currentTarget.classList.add('active');
        }

        function toggleVisibility(inputId) {
            const input = document.getElementById(inputId);
            input.type = input.type === "password" ? "text" : "password";
        }

        function showRecovery() { document.getElementById('recoveryModal').style.display = 'flex'; }
        function closeRecovery() { document.getElementById('recoveryModal').style.display = 'none'; }
    </script>
</body>
</html>
